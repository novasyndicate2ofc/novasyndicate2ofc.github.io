<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Syndicate — Offline</title>
  <script>
  /* ════════════════════════════════════════════════
     ✏️  NOVA SYNDICATE — CONFIG
  ════════════════════════════════════════════════ */
  const MAINTENANCE = false;
  const SYSTEM_FAILURE = false;
  const OFFLINE = true;           // ✏️ true = alle Seiten → offline
  const OFFLINE_REASON = "updating soon";       // ✏️ z.B. "Server maintenance"
  const OFFLINE_UNTIL  = "tmr 5:00pm uk time";       // ✏️ z.B. "Tmr 11:50 AM"
  /* ════════════════════════════════════════════════ */

  const _isOfflinePage = window.location.href.includes('offline.html');
  if (OFFLINE && !_isOfflinePage) { window.location.replace('offline.html'); }
  else if (!OFFLINE && _isOfflinePage) { window.location.replace('index.html'); }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --pink:#ff2d9b; --purple:#8b2aff; --white:#f0e8ff; --dim:rgba(240,232,255,0.5); --bg:#05000f; --border:rgba(139,42,255,0.25); }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--white); font-family:'Rajdhani',sans-serif; min-height:100vh; overflow:hidden; display:flex; align-items:center; justify-content:center; cursor:default; }

    #cursor-glow {
      will-change: transform;
      transform: translate(-50%, -50%); position:fixed; width:400px; height:400px; background:radial-gradient(circle, rgba(255,45,155,0.1) 0%, rgba(139,42,255,0.06) 40%, transparent 70%); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }
    body::before { content:''; position:fixed; inset:0; background:linear-gradient(rgba(139,42,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(139,42,255,.04) 1px,transparent 1px); background-size:60px 60px; pointer-events:none; z-index:0; }
    body::after { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 50% at 50% 0%, rgba(139,42,255,.12) 0%, transparent 70%); pointer-events:none; z-index:0; }
    /* ── PARTICLES ── */
    #particles { position:fixed; inset:0; z-index:0; pointer-events:none; }10%{opacity:.5;}90%{opacity:.3;}100%{transform:translateY(-10vh);opacity:0;} }

    .err-logo { position:fixed; top:24px; left:32px; font-family:'Orbitron'; font-size:.9rem; font-weight:900; letter-spacing:.18em; background:linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; z-index:10; text-decoration:none; }
    .err-time { position:fixed; top:24px; right:32px; font-family:'Orbitron'; font-size:.78rem; color:var(--pink); letter-spacing:.1em; border:1px solid rgba(255,45,155,.3); padding:6px 14px; border-radius:4px; background:rgba(255,45,155,.05); z-index:10; }

    .wrap { position:relative; z-index:1; text-align:center; padding:40px 24px; animation:fade-in .8s ease both; }
    @keyframes fade-in { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }

    .offline-icon {
      font-size:3rem; display:block; margin-bottom:20px;
      animation:icon-pulse 2s ease-in-out infinite;
    }
    @keyframes icon-pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.6;transform:scale(.95);} }

    .offline-name {
      font-family:'Orbitron'; font-size:clamp(1.4rem,5vw,2.4rem); font-weight:900;
      letter-spacing:.12em; text-transform:uppercase;
      background:linear-gradient(135deg, var(--white), var(--pink));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:8px;
    }

    .offline-status {
      font-family:'Orbitron'; font-size:.85rem; font-weight:700;
      letter-spacing:.35em; text-transform:uppercase;
      color:#ff3a3a; margin-bottom:28px;
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    .offline-dot {
      width:8px; height:8px; border-radius:50%;
      background:#ff3a3a; box-shadow:0 0 10px #ff3a3a;
      animation:dot-blink .8s step-end infinite;
    }
    @keyframes dot-blink { 50%{opacity:0;} }

    .offline-divider { width:60px; height:1px; background:linear-gradient(90deg,transparent,rgba(255,45,155,.5),transparent); margin:0 auto 28px; }

    .offline-card {
      display:inline-block;
      background:rgba(255,58,58,.06);
      border:1px solid rgba(255,58,58,.25);
      border-radius:10px;
      padding:24px 40px;
      min-width:280px;
      backdrop-filter:blur(10px);
    }

    .offline-row { margin-bottom:16px; }
    .offline-row:last-child { margin-bottom:0; }
    .offline-label {
      font-family:'Orbitron'; font-size:.6rem; font-weight:700;
      letter-spacing:.4em; text-transform:uppercase;
      color:rgba(255,58,58,.7); margin-bottom:6px;
    }
    .offline-value {
      font-size:1.05rem; font-weight:600; letter-spacing:.08em;
      color:var(--white);
    }
    .offline-value.empty { color:var(--dim); font-style:italic; font-size:.9rem; }

    .discord-link {
      display:inline-flex; align-items:center; gap:8px;
      margin-top:28px; font-family:'Rajdhani'; font-size:.82rem;
      font-weight:700; letter-spacing:.2em; text-transform:uppercase;
      color:var(--dim); text-decoration:none;
      border:1px solid var(--border); padding:10px 24px; border-radius:4px;
      transition:all .25s;
    }
    .discord-link:hover { color:var(--white); border-color:rgba(255,45,155,.4); background:rgba(255,45,155,.05); }

    @media(max-width:480px){ .err-logo,.err-time{display:none;} .offline-card{padding:20px 24px; min-width:240px;} }
  </style>
</head>
<body>

<div id="cursor-glow"></div>
<canvas id="particles"></canvas>


<div class="err-time" id="live-time">00:00:00</div>

<div class="wrap">
  <span class="offline-icon">📡</span>
  <div class="offline-name">Nova Syndicate</div>
  <div class="offline-status">
    <span class="offline-dot"></span>
    is offline
  </div>
  <div class="offline-divider"></div>
  <div class="offline-card">
    <div class="offline-row">
      <div class="offline-label">Reason</div>
      <div class="offline-value" id="offline-reason-text"></div>
    </div>
    <div class="offline-row">
      <div class="offline-label">Until</div>
      <div class="offline-value" id="offline-until-text"></div>
    </div>
  </div>
  <br>
  <a href="https://discord.gg/SkHmpbVYzw" target="_blank" class="discord-link">💬 Join our Discord</a>
</div>

<script>
  /* ── Live time ── */
  function updateTime() {
    const now = new Date();
    document.getElementById('live-time').textContent =
      [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  }
  updateTime(); setInterval(updateTime, 1000);

  // Hamburger menu
  function toggleMenu() {
    const menu = document.getElementById('mobile-menu');
    const btn = document.getElementById('hamburger');
    menu.classList.toggle('open');
    btn.classList.toggle('open');
    document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
  }

  /* ── Cursor Glow ── */
  const glow = document.getElementById('cursor-glow');
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
  });

  /* ── Particle + Grid System ── */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const mouse = {x:-1000, y:-1000};
  const isMobile = window.matchMedia('(max-width:767px)').matches;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();
  window.addEventListener('resize',()=>{resize();initParticles()});
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

  const GRID_SIZE = isMobile ? 48 : 64;
  let gridOffset = 0;

  function drawGrid(){
    const cols = Math.ceil(W / GRID_SIZE) + 2;
    const rows = Math.ceil(H / GRID_SIZE) + 2;
    const ox = gridOffset % GRID_SIZE;
    ctx.save();
    for(let c = -1; c < cols; c++){
      const x = c * GRID_SIZE - ox;
      const bright = (Math.round((x + ox) / GRID_SIZE) % 4 === 0);
      ctx.beginPath();ctx.moveTo(x, 0);ctx.lineTo(x, H);
      ctx.strokeStyle = bright ? 'rgba(255,45,155,.08)' : 'rgba(139,42,255,.04)';
      ctx.lineWidth = bright ? 1 : 0.5;ctx.stroke();
    }
    for(let r = -1; r < rows; r++){
      const y = r * GRID_SIZE - ox;
      const bright = (Math.round((y + ox) / GRID_SIZE) % 4 === 0);
      ctx.beginPath();ctx.moveTo(0, y);ctx.lineTo(W, y);
      ctx.strokeStyle = bright ? 'rgba(255,45,155,.08)' : 'rgba(139,42,255,.04)';
      ctx.lineWidth = bright ? 1 : 0.5;ctx.stroke();
    }
    for(let c = -1; c < cols; c++){
      for(let r = -1; r < rows; r++){
        const x = c * GRID_SIZE - ox;
        const y = r * GRID_SIZE - ox;
        const baseAlpha = (Math.round((x+ox)/GRID_SIZE) % 4 === 0 && Math.round((y+ox)/GRID_SIZE) % 4 === 0) ? 0.2 : 0.08;
        ctx.beginPath();ctx.arc(x, y, 1, 0, Math.PI*2);
        ctx.fillStyle = `rgba(139,42,255,${baseAlpha})`;ctx.fill();
      }
    }
    ctx.restore();
  }

  const COLORS=[[255,45,155],[139,42,255],[192,100,255],[240,180,255],[255,255,255]];

  class Particle{
    constructor(init){this.reset(init)}
    reset(randomY){
      this.x=Math.random()*W;
      this.y=randomY?Math.random()*H:H+10;
      this.vx=(Math.random()-.5)*.3;
      this.vy=-(Math.random()*.6+.35);
      this.size=Math.random()*1.5+.3;
      this.life=0;this.maxLife=Math.random()*300+400;
      this.wave=Math.random()*Math.PI*2;
      this.twinkle=Math.random()*Math.PI*2;
      const c=COLORS[Math.floor(Math.random()*COLORS.length)];
      this.r=c[0];this.g=c[1];this.b=c[2];
    }
    update(){
      this.life++;this.wave+=.018;this.twinkle+=.038;
      this.x+=this.vx+Math.sin(this.wave)*.16;
      this.y+=this.vy;
      if(this.life>this.maxLife||this.y<-20)this.reset(false);
    }
    draw(){
      const p=this.life/this.maxLife;
      const fade=p<.08?p/.08:p>.9?(1-p)/.1:1;
      const alpha=fade*(0.65+0.35*Math.sin(this.twinkle));
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*4);
      g.addColorStop(0,`rgba(${this.r},${this.g},${this.b},${alpha*.55})`);
      g.addColorStop(1,`rgba(${this.r},${this.g},${this.b},0)`);
      ctx.beginPath();ctx.arc(this.x,this.y,this.size*4,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${alpha})`;ctx.fill();
    }
  }

  function drawLines(){
    if(isMobile)return;
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(255,45,155,${(1-d/120)*.18})`;ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
  }

  function initParticles(){
    const count=isMobile?50:Math.min(Math.floor((W*H)/9000),120);
    particles=Array.from({length:count},()=>new Particle(true));
  }

  function animate(){
    ctx.clearRect(0,0,W,H);
    gridOffset += 0.3;
    drawGrid();
    drawLines();
    particles.forEach(p=>{p.update();p.draw()});
    requestAnimationFrame(animate);
  }
  initParticles();animate();
</script>
</body>
</html>
