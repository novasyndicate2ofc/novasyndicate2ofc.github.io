<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Syndicate — System Failure</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --pink:#ff2d9b; --purple:#8b2aff; --white:#f0e8ff; --dim:rgba(240,232,255,0.5); --bg:#05000f; --border:rgba(139,42,255,0.25); }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--white); font-family:'Rajdhani',sans-serif; min-height:100vh; overflow:hidden; display:flex; align-items:center; justify-content:center; cursor:default; }
    #cursor-glow {
      will-change: transform;
      transform: translate(-50%, -50%); position:fixed; width:400px; height:400px; background:radial-gradient(circle, rgba(255,45,155,0.12) 0%, rgba(139,42,255,0.07) 40%, transparent 70%); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }
    body::before { content:''; position:fixed; inset:0; background:linear-gradient(rgba(139,42,255,.04) 1px, transparent 1px),linear-gradient(90deg,rgba(139,42,255,.04) 1px,transparent 1px); background-size:60px 60px; pointer-events:none; z-index:0; }
    body::after { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 50% at 50% 50%, rgba(255,45,155,.1) 0%, transparent 70%); pointer-events:none; z-index:0; }
    /* ── PARTICLES ── */
    #particles { position:fixed; inset:0; z-index:0; pointer-events:none; }10%{opacity:.5;}90%{opacity:.3;}100%{transform:translateY(-10vh) translateX(30px);opacity:0;} }

    .wrap { position:relative; z-index:1; text-align:center; padding:40px 24px; animation:fade-in .8s ease both; }
    @keyframes fade-in { from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);} }

    .err-code {
      font-family:'Orbitron'; font-size:clamp(6rem,20vw,12rem); font-weight:900;
      line-height:1; letter-spacing:.05em;
      background:linear-gradient(135deg, var(--white) 0%, var(--pink) 50%, var(--purple) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 40px rgba(255,45,155,.3));
      animation:glitch 4s ease-in-out infinite;
    }
    @keyframes glitch {
      0%,95%,100% { transform:none; filter:drop-shadow(0 0 40px rgba(255,45,155,.3)); }
      96% { transform:translate(-3px,1px) skewX(-1deg); filter:drop-shadow(3px 0 0 #ff2d9b) drop-shadow(-3px 0 0 #8b2aff); }
      97% { transform:translate(3px,-1px) skewX(1deg); filter:drop-shadow(-3px 0 0 #ff2d9b) drop-shadow(3px 0 0 #8b2aff); }
      98% { transform:none; }
    }

    .err-divider { width:80px; height:1px; background:linear-gradient(90deg,transparent,var(--pink),transparent); margin:16px auto 24px; }

    .err-title { font-family:'Orbitron'; font-size:clamp(.9rem,3vw,1.2rem); font-weight:700; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); margin-bottom:12px; }
    .err-msg { font-size:1rem; color:var(--dim); letter-spacing:.08em; line-height:1.7; margin-bottom:36px; }
    .err-btn {
      display:inline-block; font-family:'Rajdhani'; font-size:.85rem; font-weight:700;
      letter-spacing:.25em; text-transform:uppercase; text-decoration:none;
      padding:14px 36px; border-radius:4px;
      background:linear-gradient(135deg, var(--pink), var(--purple));
      color:#fff; box-shadow:0 0 24px rgba(255,45,155,.3);
      transition:box-shadow .25s, transform .25s;
    }
    .err-btn:hover { box-shadow:0 0 40px rgba(255,45,155,.55); transform:translateY(-2px); }

    .err-logo { position:fixed; top:24px; left:32px; font-family:'Orbitron'; font-size:.9rem; font-weight:900; letter-spacing:.18em; background:linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; z-index:10; text-decoration:none; }
    .err-time { position:fixed; top:24px; right:32px; font-family:'Orbitron'; font-size:.78rem; color:var(--pink); letter-spacing:.1em; border:1px solid rgba(255,45,155,.3); padding:6px 14px; border-radius:4px; background:rgba(255,45,155,.05); z-index:10; }

    @media(max-width:480px){ .err-logo,.err-time{display:none;} }
  </style>
</head>
<body>

<div id="cursor-glow"></div>
<canvas id="particles"></canvas>

<a href="index.html" class="err-logo">NOVA SYNDICATE</a>
<div class="err-time" id="live-time">00:00:00</div>

<div class="wrap">
  <div class="err-code">ERROR</div>
  <div class="err-divider"></div>
  <div class="err-title">System Failure</div>
  <div class="err-msg">Something went wrong on our end.<br>We are working on a fix — please come back later.</div>
  <a href="index.html" class="err-btn">Back to Home</a>
</div>

<script>
  /* ── Live time ── */
  function updateTime() {
    const now = new Date();
    document.getElementById('live-time').textContent =
      [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  }
  updateTime(); setInterval(updateTime, 1000);

  // Hamburger menu
  function toggleMenu() {
    const menu = document.getElementById('mobile-menu');
    const btn = document.getElementById('hamburger');
    menu.classList.toggle('open');
    btn.classList.toggle('open');
    document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
  }

  /* ── Cursor Glow ── */
  const glow = document.getElementById('cursor-glow');
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
  });

  /* ── Particle + Grid System ── */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const mouse = {x:-1000, y:-1000};
  const isMobile = window.matchMedia('(max-width:767px)').matches;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();
  window.addEventListener('resize',()=>{resize();initParticles()});
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

  const GRID_SIZE = isMobile ? 48 : 64;
  let gridOffset = 0;

  function drawGrid(){
    const cols = Math.ceil(W / GRID_SIZE) + 2;
    const rows = Math.ceil(H / GRID_SIZE) + 2;
    const ox = gridOffset % GRID_SIZE;
    ctx.save();
    for(let c = -1; c < cols; c++){
      const x = c * GRID_SIZE - ox;
      const bright = (Math.round((x + ox) / GRID_SIZE) % 4 === 0);
      ctx.beginPath();ctx.moveTo(x, 0);ctx.lineTo(x, H);
      ctx.strokeStyle = bright ? 'rgba(255,45,155,.08)' : 'rgba(139,42,255,.04)';
      ctx.lineWidth = bright ? 1 : 0.5;ctx.stroke();
    }
    for(let r = -1; r < rows; r++){
      const y = r * GRID_SIZE - ox;
      const bright = (Math.round((y + ox) / GRID_SIZE) % 4 === 0);
      ctx.beginPath();ctx.moveTo(0, y);ctx.lineTo(W, y);
      ctx.strokeStyle = bright ? 'rgba(255,45,155,.08)' : 'rgba(139,42,255,.04)';
      ctx.lineWidth = bright ? 1 : 0.5;ctx.stroke();
    }
    for(let c = -1; c < cols; c++){
      for(let r = -1; r < rows; r++){
        const x = c * GRID_SIZE - ox;
        const y = r * GRID_SIZE - ox;
        const baseAlpha = (Math.round((x+ox)/GRID_SIZE) % 4 === 0 && Math.round((y+ox)/GRID_SIZE) % 4 === 0) ? 0.2 : 0.08;
        ctx.beginPath();ctx.arc(x, y, 1, 0, Math.PI*2);
        ctx.fillStyle = `rgba(139,42,255,${baseAlpha})`;ctx.fill();
      }
    }
    ctx.restore();
  }

  const COLORS=[[255,45,155],[139,42,255],[192,100,255],[240,180,255],[255,255,255]];

  class Particle{
    constructor(init){this.reset(init)}
    reset(randomY){
      this.x=Math.random()*W;
      this.y=randomY?Math.random()*H:H+10;
      this.vx=(Math.random()-.5)*.3;
      this.vy=-(Math.random()*.6+.35);
      this.size=Math.random()*1.5+.3;
      this.life=0;this.maxLife=Math.random()*300+400;
      this.wave=Math.random()*Math.PI*2;
      this.twinkle=Math.random()*Math.PI*2;
      const c=COLORS[Math.floor(Math.random()*COLORS.length)];
      this.r=c[0];this.g=c[1];this.b=c[2];
    }
    update(){
      this.life++;this.wave+=.018;this.twinkle+=.038;
      this.x+=this.vx+Math.sin(this.wave)*.16;
      this.y+=this.vy;
      if(this.life>this.maxLife||this.y<-20)this.reset(false);
    }
    draw(){
      const p=this.life/this.maxLife;
      const fade=p<.08?p/.08:p>.9?(1-p)/.1:1;
      const alpha=fade*(0.65+0.35*Math.sin(this.twinkle));
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*4);
      g.addColorStop(0,`rgba(${this.r},${this.g},${this.b},${alpha*.55})`);
      g.addColorStop(1,`rgba(${this.r},${this.g},${this.b},0)`);
      ctx.beginPath();ctx.arc(this.x,this.y,this.size*4,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${alpha})`;ctx.fill();
    }
  }

  function drawLines(){
    if(isMobile)return;
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(255,45,155,${(1-d/120)*.18})`;ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
  }

  function initParticles(){
    const count=isMobile?50:Math.min(Math.floor((W*H)/9000),120);
    particles=Array.from({length:count},()=>new Particle(true));
  }

  function animate(){
    ctx.clearRect(0,0,W,H);
    gridOffset += 0.3;
    drawGrid();
    drawLines();
    particles.forEach(p=>{p.update();p.draw()});
    requestAnimationFrame(animate);
  }
  initParticles();animate();
</script>
</body>
</html>
