<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Nova Syndicate — Maintenance</title>
<script>
  /* ════════════════════════════════════════════════
     ✏️  NOVA SYNDICATE — CONFIG
     Hier Theme, Maintenance & Announcement ändern!
  ════════════════════════════════════════════════ */

  const SYSTEM_FAILURE = false;
  const OFFLINE = false;           // ✏️ true = alle Seiten → offline
  const OFFLINE_REASON = "";       // ✏️ z.B. "Server maintenance"
  const OFFLINE_UNTIL  = "";       // ✏️ z.B. "Tmr 11:50 AM"
  const GLOBAL_ANNOUNCEMENT = "";
  /* ════════════════════════════════════════════════ */

  // Maintenance
  const _path = window.location.pathname;
  const _isMaintPage   = _path.endsWith('maintenance.html');
  const _is404Page     = _path.endsWith('404.html');
  const _isOfflinePage = _path.endsWith('offline.html');
  const _isNormalPage  = !_isMaintPage && !_is404Page && !_isOfflinePage;

  if (MAINTENANCE    && _isNormalPage)  { window.location.replace('maintenance.html'); }
  if (!MAINTENANCE   && _isMaintPage && !window.location.search.includes('bypass=1'))   { window.location.replace('index.html'); }
  if (SYSTEM_FAILURE && !_is404Page)    { window.location.replace('404.html'); }
  if (!SYSTEM_FAILURE && _is404Page)    { window.location.replace('index.html'); }
  if (OFFLINE        && !_isOfflinePage){ window.location.replace('offline.html'); }
  if (!OFFLINE       && _isOfflinePage) { window.location.replace('index.html'); }


  // Greeting + Particles
</script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:   #ff2d9b;
      --purple: #8b2aff;
      --white:  #f0e8ff;
      --dim:    rgba(240,232,255,0.5);
      --bg:     #05000f;
      --border: rgba(139,42,255,0.25);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CURSOR GLOW ── */
    #cursor-glow {
      will-change: transform;
      transform: translate(-50%, -50%);
      position:fixed; width:400px; height:400px;
      background:radial-gradient(circle, rgba(255,45,155,0.14) 0%, rgba(139,42,255,0.08) 40%, transparent 70%);
      border-radius:50%; pointer-events:none; z-index:9998;
      transform:translate(-50%,-50%);
    }

    /* ── BG GRID ── */
    body::before {
      content:''; position:fixed; inset:0;
      background:
        linear-gradient(rgba(139,42,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,42,255,.04) 1px, transparent 1px);
      background-size:60px 60px; pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; inset:0;
      background:radial-gradient(ellipse 80% 50% at 50% 0%, rgba(139,42,255,.15) 0%, transparent 70%);
      pointer-events:none; z-index:0;
    }

    /* ── PARTICLES ── */
    /* ── PARTICLES ── */
    #particles { position:fixed; inset:0; z-index:0; pointer-events:none; }
      10%  { opacity:.5; }
      90%  { opacity:.3; }
      100% { transform:translateY(-10vh) translateX(30px); opacity:0; }
    }

    /* ── MAIN CONTENT ── */
    .maint-wrap {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fade-in .8s ease both;
    }

    @keyframes fade-in {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── ICON ── */
    .maint-icon {
      font-size: 4rem;
      display: block;
      text-align: center;
      margin-bottom: 24px;
      animation: spin 8s linear infinite;
      filter: drop-shadow(0 0 20px rgba(255,45,155,.5));
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOGO ── */
    .maint-logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(.7rem, 2vw, .9rem);
      letter-spacing: .5em;
      color: var(--dim);
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    /* ── TITLE ── */
    .maint-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: .08em;
      background: linear-gradient(135deg, var(--white) 0%, var(--pink) 50%, var(--purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,45,155,.3));
      margin-bottom: 24px;
    }

    /* ── DIVIDER ── */
    .maint-divider {
      width: 100px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      margin: 0 auto 28px;
    }

    /* ── SUBTITLE ── */
    .maint-sub {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
      width: min(420px, 80vw);
      text-align: left;
    }
    .maint-sub span {
      color: var(--pink);
      font-weight: 700;
    }

    .maint-msg {
      font-size: 1rem;
      color: var(--dim);
      letter-spacing: .1em;
      margin-bottom: 40px;
      line-height: 1.7;
      width: min(420px, 80vw);
      text-align: left;
    }

    /* ── LOADER BAR ── */
    .maint-loader {
      width: min(420px, 80vw);
      margin: 0 auto 28px;
      position: static;
    }
    .maint-loader-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-family: 'Orbitron';
      font-size: .62rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .maint-loader-label { color: var(--pink); }
    .maint-loader-pct { color: var(--white); font-weight: 700; }
    .maint-bar-wrap {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .maint-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      box-shadow: 0 0 10px var(--pink), 0 0 20px rgba(255,45,155,.4);
      width: 0%;
      border-radius: 2px;
      transition: width .4s ease;
    }
    .maint-bar-dots {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      padding: 0 2px;
    }
    .maint-bar-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      transition: background .3s;
    }
    .maint-bar-dot.lit { background: var(--pink); box-shadow: 0 0 6px var(--pink); }

    /* ── BLINKING STATUS ── */
    .maint-status {
      font-size: .72rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: var(--dim);
      animation: blink 1s step-end infinite;
      margin-bottom: 48px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── SOCIAL LINKS ── */
    .maint-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .maint-link {
      font-family: 'Rajdhani'; font-size: .8rem; font-weight: 700;
      letter-spacing: .25em; text-transform: uppercase;
      text-decoration: none; padding: 12px 28px;
      border-radius: 3px; border: 1px solid var(--border);
      color: var(--dim);
      transition: all .25s ease;
    }
    .maint-link:hover {
      border-color: var(--pink);
      color: var(--white);
      background: rgba(255,45,155,.07);
      box-shadow: 0 0 20px rgba(255,45,155,.2);
    }
    .maint-link.primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 0 20px rgba(255,45,155,.3);
    }
    .maint-link.primary:hover {
      box-shadow: 0 0 36px rgba(255,45,155,.55);
      transform: translateY(-2px);
    }

    /* ── LIVE TIME ── */
    .maint-time {
      position: fixed; top: 24px; right: 32px;
      font-family: 'Orbitron'; font-size: .78rem;
      color: var(--pink); letter-spacing: .1em;
      border: 1px solid rgba(255,45,155,.3);
      padding: 6px 14px; border-radius: 4px;
      background: rgba(255,45,155,.05);
      z-index: 10;
    }

    /* ── LOGO TOP LEFT ── */
    .maint-logo-nav {
      position: fixed; top: 24px; left: 32px;
      font-family: 'Orbitron'; font-size: .9rem; font-weight: 900;
      letter-spacing: .18em;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      z-index: 10;
    }

    @media(max-width:480px){
      .maint-time, .maint-logo-nav { display:none; }
    }

    /* ── HAMBURGER MENU ── */
    .nav-links { display:none !important; }
    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      z-index: 1100;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: all .3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1050;
      background: rgba(5,0,15,.97);
      backdrop-filter: blur(20px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: menu-in .25s ease both;
    }
    .mobile-menu.open { display: flex; }
    @keyframes menu-in {
      from { opacity:0; transform:scale(.97); }
      to   { opacity:1; transform:scale(1); }
    }
    .mobile-menu a {
      font-family: 'Orbitron'; font-size:1.2rem; font-weight:700;
      letter-spacing:.2em; text-transform:uppercase;
      color: var(--dim); text-decoration:none;
      padding: 12px 28px; border-radius:6px;
      border: 1px solid transparent;
      transition: all .2s ease;
      display: inline-block;
    }
    .mobile-menu a:hover {
      color: var(--white);
      border-color: var(--border);
      background: var(--card);
    }
    .mobile-menu a.active {
      background: linear-gradient(135deg, rgba(255,45,155,.1), rgba(139,42,255,.1));
      border-color: rgba(255,45,155,.5);
      color: var(--pink);
      box-shadow: 0 0 16px rgba(255,45,155,.15);
    }
    .mobile-menu-logo {
      font-family:'Orbitron'; font-size:.85rem; font-weight:900;
      letter-spacing:.3em;
      background:linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:32px;
    }
    .mobile-menu-close {
      position: absolute; top:24px; right:24px;
      background:none; border:none; color:var(--dim);
      font-size:1.5rem; cursor:pointer; transition:color .2s;
    }
    .mobile-menu-close:hover { color:var(--white); }

    @media(max-width:768px) {
      .nav-links { display:none; }
    }
  </style>
</head>
<body>

<div id="cursor-glow"></div>

<!-- ── MOBILE MENU OVERLAY ── -->
<div class="mobile-menu" id="mobile-menu">

</div>
<canvas id="particles"></canvas>

<div class="maint-logo-nav">NOVA SYNDICATE</div>

<div class="maint-wrap">
  <span class="maint-icon">⚙️</span>
  <div class="maint-title">MAINTENANCE</div>
  <div class="maint-divider"></div>
  <div class="maint-sub"><span>!</span> We'll be right back <span>!</span></div>
  <div class="maint-msg">
    pls come back later<br>
    We're working hard to improve things for you.
  </div>
  <div class="maint-loader">
    <div class="maint-loader-top">
      <span class="maint-loader-label">WORKING ON IT</span>
      <span class="maint-loader-pct" id="loader-pct">0%</span>
    </div>
    <div class="maint-bar-wrap">
      <div class="maint-bar" id="loader-bar"></div>
    </div>
    <div class="maint-bar-dots" id="loader-dots"></div>
  </div>
  <div class="maint-links">

<script>
  /* ── Auto-reload ── */
  setInterval(() => { window.location.reload(); }, 60000);

  /* ── Loader bar ── */
  const bar = document.getElementById('loader-bar');
  const pct = document.getElementById('loader-pct');
  const dotsWrap = document.getElementById('loader-dots');
  const DOT_COUNT = 18;
  for(let i=0;i<DOT_COUNT;i++){const d=document.createElement('div');d.className='maint-bar-dot';dotsWrap.appendChild(d);}
  const dots = dotsWrap.querySelectorAll('.maint-bar-dot');
  let progress = 0;
  setInterval(()=>{
    progress += Math.random() * 0.4 + 0.1;
    if(progress >= 100) progress = 0;
    const p = Math.round(progress);
    bar.style.width = p + '%';
    pct.textContent = p + '%';
    const litCount = Math.round((p / 100) * DOT_COUNT);
    dots.forEach((d,i) => d.classList.toggle('lit', i < litCount));
  }, 400);

  /* ── Live time ── */
  function updateTime() {
    const now = new Date();
    document.getElementById('live-time').textContent =
      [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  }
  updateTime(); setInterval(updateTime, 1000);

  // Hamburger menu
  function toggleMenu() {
    const menu = document.getElementById('mobile-menu');
    const btn = document.getElementById('hamburger');
    menu.classList.toggle('open');
    btn.classList.toggle('open');
    document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
  }

  /* ── Cursor Glow ── */
  const glow = document.getElementById('cursor-glow');
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
  });

  /* ── Particle + Grid System ── */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const mouse = {x:-1000, y:-1000};
  const isMobile = window.matchMedia('(max-width:767px)').matches;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();
  window.addEventListener('resize',()=>{resize();initParticles()});
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

  const GRID_SIZE = isMobile ? 48 : 64;
  let gridOffset = 0;

  function drawGrid(){
    const cols = Math.ceil(W / GRID_SIZE) + 2;
    const rows = Math.ceil(H / GRID_SIZE) + 2;
    const ox = gridOffset % GRID_SIZE;
    ctx.save();
    for(let c = -1; c < cols; c++){
      const x = c * GRID_SIZE - ox;
      const bright = (Math.round((x + ox) / GRID_SIZE) % 4 === 0);
      ctx.beginPath();ctx.moveTo(x, 0);ctx.lineTo(x, H);
      ctx.strokeStyle = bright ? 'rgba(255,45,155,.08)' : 'rgba(139,42,255,.04)';
      ctx.lineWidth = bright ? 1 : 0.5;ctx.stroke();
    }
    for(let r = -1; r < rows; r++){
      const y = r * GRID_SIZE - ox;
      const bright = (Math.round((y + ox) / GRID_SIZE) % 4 === 0);
      ctx.beginPath();ctx.moveTo(0, y);ctx.lineTo(W, y);
      ctx.strokeStyle = bright ? 'rgba(255,45,155,.08)' : 'rgba(139,42,255,.04)';
      ctx.lineWidth = bright ? 1 : 0.5;ctx.stroke();
    }
    for(let c = -1; c < cols; c++){
      for(let r = -1; r < rows; r++){
        const x = c * GRID_SIZE - ox;
        const y = r * GRID_SIZE - ox;
        const baseAlpha = (Math.round((x+ox)/GRID_SIZE) % 4 === 0 && Math.round((y+ox)/GRID_SIZE) % 4 === 0) ? 0.2 : 0.08;
        ctx.beginPath();ctx.arc(x, y, 1, 0, Math.PI*2);
        ctx.fillStyle = `rgba(139,42,255,${baseAlpha})`;ctx.fill();
      }
    }
    ctx.restore();
  }

  const COLORS=[[255,45,155],[139,42,255],[192,100,255],[240,180,255],[255,255,255]];

  class Particle{
    constructor(init){this.reset(init)}
    reset(randomY){
      this.x=Math.random()*W;
      this.y=randomY?Math.random()*H:H+10;
      this.vx=(Math.random()-.5)*.3;
      this.vy=-(Math.random()*.6+.35);
      this.size=Math.random()*1.5+.3;
      this.life=0;this.maxLife=Math.random()*300+400;
      this.wave=Math.random()*Math.PI*2;
      this.twinkle=Math.random()*Math.PI*2;
      const c=COLORS[Math.floor(Math.random()*COLORS.length)];
      this.r=c[0];this.g=c[1];this.b=c[2];
    }
    update(){
      this.life++;this.wave+=.018;this.twinkle+=.038;
      this.x+=this.vx+Math.sin(this.wave)*.16;
      this.y+=this.vy;
      if(this.life>this.maxLife||this.y<-20)this.reset(false);
    }
    draw(){
      const p=this.life/this.maxLife;
      const fade=p<.08?p/.08:p>.9?(1-p)/.1:1;
      const alpha=fade*(0.65+0.35*Math.sin(this.twinkle));
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*4);
      g.addColorStop(0,`rgba(${this.r},${this.g},${this.b},${alpha*.55})`);
      g.addColorStop(1,`rgba(${this.r},${this.g},${this.b},0)`);
      ctx.beginPath();ctx.arc(this.x,this.y,this.size*4,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${alpha})`;ctx.fill();
    }
  }

  function drawLines(){
    if(isMobile)return;
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(255,45,155,${(1-d/120)*.18})`;ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
  }

  function initParticles(){
    const count=isMobile?50:Math.min(Math.floor((W*H)/9000),120);
    particles=Array.from({length:count},()=>new Particle(true));
  }

  function animate(){
    ctx.clearRect(0,0,W,H);
    gridOffset += 0.3;
    drawGrid();
    drawLines();
    particles.forEach(p=>{p.update();p.draw()});
    requestAnimationFrame(animate);
  }
  initParticles();animate();
</script>
</body>
