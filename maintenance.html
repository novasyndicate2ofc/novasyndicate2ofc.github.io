<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Syndicate — Maintenance</title>
<script>
  /* ════════════════════════════════════════════════
     ✏️  NOVA SYNDICATE — CONFIG
     Hier Theme, Maintenance & Announcement ändern!
  ════════════════════════════════════════════════ */
  const MAINTENANCE = false;
  const GLOBAL_ANNOUNCEMENT = "";
  /* ════════════════════════════════════════════════ */

  // Maintenance
  const _isMaintPage = window.location.href.includes('maintenance.html');
  if (MAINTENANCE && !_isMaintPage) { window.location.replace('maintenance.html'); }
  else if (!MAINTENANCE && _isMaintPage) { window.location.replace('index.html'); }


  // Greeting + Particles
</script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:   #ff2d9b;
      --purple: #8b2aff;
      --white:  #f0e8ff;
      --dim:    rgba(240,232,255,0.5);
      --bg:     #05000f;
      --border: rgba(139,42,255,0.25);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CURSOR GLOW ── */
    #cursor-glow {
      position:fixed; width:400px; height:400px;
      background:radial-gradient(circle, rgba(255,45,155,0.14) 0%, rgba(139,42,255,0.08) 40%, transparent 70%);
      border-radius:50%; pointer-events:none; z-index:9998;
      transform:translate(-50%,-50%);
    }

    /* ── BG GRID ── */
    body::before {
      content:''; position:fixed; inset:0;
      background:
        linear-gradient(rgba(139,42,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,42,255,.04) 1px, transparent 1px);
      background-size:60px 60px; pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; inset:0;
      background:radial-gradient(ellipse 80% 50% at 50% 0%, rgba(139,42,255,.15) 0%, transparent 70%);
      pointer-events:none; z-index:0;
    }

    /* ── PARTICLES ── */
    .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .particle  { position:absolute; border-radius:50%; animation:float-p linear infinite; opacity:0; }
    @keyframes float-p {
      0%   { transform:translateY(100vh); opacity:0; }
      10%  { opacity:.5; }
      90%  { opacity:.3; }
      100% { transform:translateY(-10vh) translateX(30px); opacity:0; }
    }

    /* ── MAIN CONTENT ── */
    .maint-wrap {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
      animation: fade-in .8s ease both;
    }

    @keyframes fade-in {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── ICON ── */
    .maint-icon {
      font-size: 5rem;
      display: block;
      margin-bottom: 32px;
      animation: spin 8s linear infinite;
      filter: drop-shadow(0 0 20px rgba(255,45,155,.5));
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOGO ── */
    .maint-logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(.7rem, 2vw, .9rem);
      letter-spacing: .5em;
      color: var(--dim);
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    /* ── TITLE ── */
    .maint-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: .08em;
      background: linear-gradient(135deg, var(--white) 0%, var(--pink) 50%, var(--purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,45,155,.3));
      margin-bottom: 24px;
    }

    /* ── DIVIDER ── */
    .maint-divider {
      width: 100px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      margin: 0 auto 28px;
    }

    /* ── SUBTITLE ── */
    .maint-sub {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
    }
    .maint-sub span {
      color: var(--pink);
      font-weight: 700;
    }

    .maint-msg {
      font-size: 1rem;
      color: var(--dim);
      letter-spacing: .1em;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    /* ── PROGRESS BAR ── */
    .maint-bar-wrap {
      width: 280px; height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto 16px;
    }
    .maint-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      box-shadow: 0 0 12px var(--pink);
      width: 0;
      animation: bar-loop 3s ease-in-out infinite;
    }
    @keyframes bar-loop {
      0%   { width:0%;   margin-left:0%; }
      50%  { width:60%;  margin-left:20%; }
      100% { width:0%;   margin-left:100%; }
    }

    /* ── BLINKING STATUS ── */
    .maint-status {
      font-size: .72rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: var(--dim);
      animation: blink 1s step-end infinite;
      margin-bottom: 48px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── SOCIAL LINKS ── */
    .maint-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .maint-link {
      font-family: 'Rajdhani'; font-size: .8rem; font-weight: 700;
      letter-spacing: .25em; text-transform: uppercase;
      text-decoration: none; padding: 12px 28px;
      border-radius: 3px; border: 1px solid var(--border);
      color: var(--dim);
      transition: all .25s ease;
    }
    .maint-link:hover {
      border-color: var(--pink);
      color: var(--white);
      background: rgba(255,45,155,.07);
      box-shadow: 0 0 20px rgba(255,45,155,.2);
    }
    .maint-link.primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 0 20px rgba(255,45,155,.3);
    }
    .maint-link.primary:hover {
      box-shadow: 0 0 36px rgba(255,45,155,.55);
      transform: translateY(-2px);
    }

    /* ── LIVE TIME ── */
    .maint-time {
      position: fixed; top: 24px; right: 32px;
      font-family: 'Orbitron'; font-size: .78rem;
      color: var(--pink); letter-spacing: .1em;
      border: 1px solid rgba(255,45,155,.3);
      padding: 6px 14px; border-radius: 4px;
      background: rgba(255,45,155,.05);
      z-index: 10;
    }

    /* ── LOGO TOP LEFT ── */
    .maint-logo-nav {
      position: fixed; top: 24px; left: 32px;
      font-family: 'Orbitron'; font-size: .9rem; font-weight: 900;
      letter-spacing: .18em;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      z-index: 10;
    }

    @media(max-width:480px){
      .maint-time, .maint-logo-nav { display:none; }
    }

    /* ── HAMBURGER MENU ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      z-index: 1100;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: all .3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1050;
      background: rgba(5,0,15,.97);
      backdrop-filter: blur(20px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: menu-in .25s ease both;
    }
    .mobile-menu.open { display: flex; }
    @keyframes menu-in {
      from { opacity:0; transform:scale(.97); }
      to   { opacity:1; transform:scale(1); }
    }
    .mobile-menu a {
      font-family: 'Orbitron'; font-size:1.2rem; font-weight:700;
      letter-spacing:.2em; text-transform:uppercase;
      color: var(--dim); text-decoration:none;
      padding: 12px 28px; border-radius:6px;
      border: 1px solid transparent;
      transition: all .2s ease;
      display: inline-block;
    }
    .mobile-menu a:hover {
      color: var(--white);
      border-color: var(--border);
      background: var(--card);
    }
    .mobile-menu a.active {
      background: linear-gradient(135deg, rgba(255,45,155,.1), rgba(139,42,255,.1));
      border-color: rgba(255,45,155,.5);
      color: var(--pink);
      box-shadow: 0 0 16px rgba(255,45,155,.15);
    }
    .mobile-menu-logo {
      font-family:'Orbitron'; font-size:.85rem; font-weight:900;
      letter-spacing:.3em;
      background:linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:32px;
    }
    .mobile-menu-close {
      position: absolute; top:24px; right:24px;
      background:none; border:none; color:var(--dim);
      font-size:1.5rem; cursor:pointer; transition:color .2s;
    }
    .mobile-menu-close:hover { color:var(--white); }

    @media(max-width:768px) {
      .nav-links { display:none; }
      .hamburger { display:flex; }
    }
  </style>
</head>
<body>

<div id="cursor-glow"></div>

<!-- ── MOBILE MENU OVERLAY ── -->
<div class="mobile-menu" id="mobile-menu">
  <button class="mobile-menu-close" onclick="toggleMenu()">✕</button>
  <div class="mobile-menu-logo">NOVA SYNDICATE</div>
  <a href="index.html" >Home</a>
  <a href="team.html" >Team</a>
  <a href="status.html" >Status</a>
  <a href="information.html" >Information</a>
  <a href="announcements.html" >Announcements</a>
</div>
<div class="particles" id="particles"></div>

<div class="maint-logo-nav">NOVA SYNDICATE</div>
<div class="maint-time" id="live-time">00:00:00</div>

<div class="maint-wrap">
  <span class="maint-icon">⚙️</span>
  <div class="maint-logo">Nova Syndicate</div>
  <div class="maint-title">MAINTENANCE</div>
  <div class="maint-divider"></div>
  <div class="maint-sub"><span>!</span> We'll be right back <span>!</span></div>
  <div class="maint-msg">
    pls come back later<br>
    We're working hard to improve things for you.
  </div>
  <div class="maint-bar-wrap"><div class="maint-bar"></div></div>
  <div class="maint-status">WORKING ON IT...</div>
  <div class="maint-links">
    <a href="https://discord.gg/SkHmpbVYzw" target="_blank" class="maint-link primary">Join Discord</a>
    <a href="https://www.tiktok.com/@nova_syndi0" target="_blank" class="maint-link">TikTok</a>
  </div>
</div>

<script>
  /* Auto-reload every 10s so when MAINTENANCE=false in config.js
     the page automatically redirects back to index */
  setInterval(() => { window.location.reload(); }, 10000);

  /* ── LIVE TIME ── */
  function updateTime() {
    const now = new Date();
    document.getElementById('live-time').textContent =
      [now.getHours(),now.getMinutes(),now.getSeconds()]
        .map(n=>String(n).padStart(2,'0')).join(':');
  }
  updateTime(); setInterval(updateTime, 1000);

  /* ── CURSOR GLOW ── */
  const glow = document.getElementById('cursor-glow');
  let mx=0,my=0,gx=0,gy=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function animGlow(){gx+=(mx-gx)*.08;gy+=(my-gy)*.08;glow.style.left=gx+'px';glow.style.top=gy+'px';requestAnimationFrame(animGlow);})();

  /* ── PARTICLES ── */
  const container=document.getElementById('particles');
  const colors=['#ff2d9b','#8b2aff','#f0e8ff','#c84dff'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div');
    p.classList.add('particle');
    const size=Math.random()*3+1;
    const color=colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText=`width:${size}px;height:${size}px;background:${color};left:${Math.random()*100}%;animation-duration:${Math.random()*14+10}s;animation-delay:${Math.random()*15}s;box-shadow:0 0 ${size*3}px ${color};`;
    container.appendChild(p);
  }

  // Hamburger menu
  function toggleMenu() {
    const menu = document.getElementById('mobile-menu');
    const btn = document.getElementById('hamburger');
    menu.classList.toggle('open');
    btn.classList.toggle('open');
    document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
  }
</script>
</body>
</html>
