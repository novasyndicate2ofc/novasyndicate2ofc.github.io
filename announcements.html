<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Syndicate — Announcements</title>
  <script>
  /* ════════════════════════════════════════════════
     ✏️  NOVA SYNDICATE — CONFIG
     Hier Theme, Maintenance & Announcement ändern!
  ════════════════════════════════════════════════ */
  const MAINTENANCE = false;
  const SYSTEM_FAILURE = false;
  const OFFLINE = false;           // ✏️ true = alle Seiten → offline
  const OFFLINE_REASON = "";       // ✏️ z.B. "Server maintenance"
  const OFFLINE_UNTIL  = "";       // ✏️ z.B. "Tmr 11:50 AM"
  const GLOBAL_THEME = "default";
  const GLOBAL_ANNOUNCEMENT = "";
  /* ════════════════════════════════════════════════ */

  const _isMaintPage = window.location.href.includes('maintenance.html');
  if (MAINTENANCE && !_isMaintPage) { window.location.replace('maintenance.html'); }
  else if (!MAINTENANCE && _isMaintPage) { window.location.replace('index.html'); }
  const _is404Page = window.location.href.includes('404.html');
  const _isOfflinePage = window.location.href.includes('offline.html');
  if (SYSTEM_FAILURE && !_is404Page) { window.location.replace('404.html'); }
  else if (!SYSTEM_FAILURE && _is404Page) { window.location.replace('index.html'); }
  if (OFFLINE && !_isOfflinePage) { window.location.replace('offline.html'); }
  else if (!OFFLINE && _isOfflinePage) { window.location.replace('index.html'); }

  if (GLOBAL_THEME !== "default") {
    document.documentElement.setAttribute('data-theme', GLOBAL_THEME);
  }

  const _GREETINGS = {
    winter:"Happy Winter ❄️", christmas:"Merry Christmas 🎄",
    halloween:"Happy Halloween 🎃", newyear:"Happy New Year 🎆",
    valentine:"Happy Valentine's Day ❤️", sunset:"Enjoy the Sunset 🌅"
  };
  const _EMOJIS = {
    winter:    {e:['❄️','❄️','🌨️','❄️','❄️'], n:35},
    christmas: {e:['❄️','🎄','🎅','⭐','🎁'], n:28},
    halloween: {e:['🎃','🕷️','💀','🦇','👻','🕸️'], n:25},
    valentine: {e:['❤️','💕','💖','💗','🌹','💝'], n:28}
  };
  document.addEventListener('DOMContentLoaded', () => {
    if (_GREETINGS[GLOBAL_THEME]) {
      const s = document.createElement('style');
      s.textContent = `#theme-greeting{position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:995;font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:#f0e8ff;background:linear-gradient(90deg,rgba(139,42,255,.25),rgba(255,45,155,.25));border:1px solid rgba(255,45,155,.4);backdrop-filter:blur(10px);padding:8px 28px;border-radius:30px;white-space:nowrap;pointer-events:none;animation:greet-in .8s ease both;}@keyframes greet-in{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}`;
      document.head.appendChild(s);
      const b = document.createElement('div');
      b.id = 'theme-greeting';
      b.textContent = _GREETINGS[GLOBAL_THEME];
      document.body.appendChild(b);
    }
    if (_EMOJIS[GLOBAL_THEME]) {
      const s = document.createElement('style');
      s.textContent = `.t-particle{position:fixed;pointer-events:none;z-index:9997;animation:t-fall linear infinite;opacity:0;user-select:none;}@keyframes t-fall{0%{top:-60px;opacity:0;}5%{opacity:1;}95%{opacity:.9;}100%{top:110vh;opacity:0;}}`;
      document.head.appendChild(s);
      const {e, n} = _EMOJIS[GLOBAL_THEME];
      for (let i=0; i<n; i++) {
        const el = document.createElement('div');
        el.classList.add('t-particle');
        el.textContent = e[Math.floor(Math.random()*e.length)];
        const size = Math.random()*16+12;
        el.style.cssText = `left:${Math.random()*100}%;top:-60px;font-size:${size}px;animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*14}s;`;
        document.body.appendChild(el);
      }
    }
  });
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:   #ff2d9b;
      --purple: #8b2aff;
      --white:  #f0e8ff;
      --dim:    rgba(240,232,255,0.5);
      --bg:     #05000f;
      --card:   rgba(139,42,255,0.07);
      --border: rgba(139,42,255,0.25);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--white); font-family:'Rajdhani',sans-serif; min-height:100vh; overflow-x:hidden; cursor:default; }

    #cursor-glow {
      will-change: transform;
      transform: translate(-50%, -50%); position:fixed; width:300px; height:300px; background:radial-gradient(circle, rgba(255,45,155,0.15) 0%, rgba(139,42,255,0.08) 40%, transparent 70%); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }
    body::after { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 50% at 50% 0%, rgba(139,42,255,.15) 0%, transparent 70%); pointer-events:none; z-index:0; }

    /* ── NAV ── */
    nav { position:fixed; top:0; left:0; right:0; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:18px 48px; background:rgba(5,0,15,.75); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
    .nav-logo { font-family:'Orbitron'; font-size:1.1rem; font-weight:900; letter-spacing:.18em; background:linear-gradient(135deg, var(--pink), var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none; }
    .nav-links { display:flex; gap:28px; list-style:none; }
    .nav-links a { font-family:'Rajdhani'; font-size:.9rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--dim); text-decoration:none; transition:color .2s; position:relative; }
    .nav-links a::after { content:''; position:absolute; bottom:-4px; left:0; right:0; height:1px; background:linear-gradient(90deg, var(--pink), var(--purple)); transform:scaleX(0); transform-origin:left; transition:transform .25s ease; }
    .nav-links a:hover, .nav-links a.active { color:var(--white); }
    .nav-links a:hover::after, .nav-links a.active::after { transform:scaleX(1); }
    .nav-time { font-family:'Orbitron'; font-size:.8rem; color:var(--pink); letter-spacing:.1em; border:1px solid rgba(255,45,155,.3); padding:6px 14px; border-radius:4px; background:rgba(255,45,155,.05); }

    /* ── ANNOUNCEMENT BANNER ── */
    #announcement { display:none; position:fixed; top:70px; left:0; right:0; z-index:990; background:linear-gradient(90deg,rgba(139,42,255,.15),rgba(255,45,155,.15)); border-bottom:1px solid var(--border); backdrop-filter:blur(10px); padding:10px 48px; text-align:center; }
    #announcement.visible { display:block; }
    .announcement-inner { display:inline-flex;align-items:center;gap:10px;font-size:.82rem;letter-spacing:.12em;color:var(--white); }
    .announcement-close { position:absolute;right:20px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);font-size:1rem;cursor:pointer;transition:color .2s; }
    .announcement-close:hover { color:var(--white); }

    /* ── MAIN ── */
    main { position:relative; z-index:1; padding:130px 48px 100px; max-width:860px; margin:0 auto; }

    /* ── PAGE HEADER ── */
    .page-header { text-align:center; margin-bottom:52px; animation:fade-up .7s ease both; }
    .page-tag { font-size:.7rem; letter-spacing:.5em; text-transform:uppercase; color:var(--purple); margin-bottom:14px; display:block; }
    .page-title { font-family:'Orbitron'; font-size:clamp(2rem,5vw,3.2rem); font-weight:700; background:linear-gradient(135deg, var(--white), var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .page-desc { color:var(--dim); margin-top:10px; font-size:1rem; letter-spacing:.05em; }

    @keyframes fade-up { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }

    /* ── ANNOUNCEMENT CARDS ── */
    .ann-list { display:flex; flex-direction:column; gap:16px; }

    .ann-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:28px 32px;
      position:relative; overflow:hidden;
      transition:border-color .25s, box-shadow .25s;
      animation:fade-up .5s ease both;
    }
    .ann-card:nth-child(1){animation-delay:.05s}
    .ann-card:nth-child(2){animation-delay:.12s}
    .ann-card:nth-child(3){animation-delay:.19s}
    .ann-card:nth-child(4){animation-delay:.26s}
    .ann-card:nth-child(5){animation-delay:.33s}

    .ann-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; transition:opacity .25s; opacity:0; }
    .ann-card:hover { box-shadow:0 8px 40px rgba(139,42,255,.1); }
    .ann-card:hover::before { opacity:1; }

    /* Type colors */
    .ann-card.warning  { border-color:rgba(255,180,0,.3); }
    .ann-card.warning::before  { background:linear-gradient(90deg,#ff9500,#ffd02a); }
    .ann-card.warning:hover  { border-color:rgba(255,180,0,.6); box-shadow:0 8px 40px rgba(255,180,0,.08); }

    .ann-card.info     { border-color:rgba(0,180,255,.3); }
    .ann-card.info::before     { background:linear-gradient(90deg,#0077cc,#00cfff); }
    .ann-card.info:hover     { border-color:rgba(0,180,255,.6); box-shadow:0 8px 40px rgba(0,180,255,.08); }

    .ann-card.success  { border-color:rgba(42,255,139,.3); }
    .ann-card.success::before  { background:linear-gradient(90deg,#00aa55,#2aff8b); }
    .ann-card.success:hover  { border-color:rgba(42,255,139,.6); box-shadow:0 8px 40px rgba(42,255,139,.08); }

    .ann-card.error    { border-color:rgba(255,60,60,.3); }
    .ann-card.error::before    { background:linear-gradient(90deg,#cc0000,#ff3a2a); }
    .ann-card.error:hover    { border-color:rgba(255,60,60,.6); box-shadow:0 8px 40px rgba(255,60,60,.08); }

    .ann-card.system_failure { border-color:rgba(255,60,60,.5); animation:failure-pulse 2s ease-in-out infinite; }
    .ann-card.system_failure::before { background:linear-gradient(90deg,#ff0000,#ff3a2a); opacity:1; }
    @keyframes failure-pulse { 0%,100%{box-shadow:0 0 20px rgba(255,0,0,.15);} 50%{box-shadow:0 0 40px rgba(255,0,0,.35);} }

    .ann-card.offline { border-color:rgba(255,100,0,.4); animation:offline-pulse 2s ease-in-out infinite; }
    .ann-card.offline::before { background:linear-gradient(90deg,#cc4400,#ff6600); opacity:1; }
    @keyframes offline-pulse { 0%,100%{box-shadow:0 0 20px rgba(255,100,0,.1);} 50%{box-shadow:0 0 40px rgba(255,100,0,.3);} }

    .ann-card.default  { border-color:var(--border); }
    .ann-card.new      { border-color:rgba(100,255,100,.3); }
    .ann-card.new::before      { background:linear-gradient(90deg,#00aa55,#4dff91); }
    .ann-card.new:hover      { border-color:rgba(100,255,100,.6); box-shadow:0 8px 40px rgba(100,255,100,.08); }
    .ann-card.updated  { border-color:rgba(80,180,255,.3); }
    .ann-card.updated::before  { background:linear-gradient(90deg,#0066cc,#50b4ff); }
    .ann-card.updated:hover  { border-color:rgba(80,180,255,.6); box-shadow:0 8px 40px rgba(80,180,255,.08); }
    .ann-card.new::before      { background:linear-gradient(90deg,#00aa55,#4dff91); }
    .ann-card.new:hover      { border-color:rgba(100,255,100,.6); box-shadow:0 8px 40px rgba(100,255,100,.08); }
    .ann-card.default::before  { background:linear-gradient(90deg, var(--purple), var(--pink)); }
    .ann-card.default:hover  { border-color:rgba(255,45,155,.4); }

    /* Card header */
    .ann-header { display:flex; align-items:center; gap:14px; margin-bottom:12px; }
    .ann-badge {
      font-family:'Orbitron'; font-size:.6rem; font-weight:700;
      letter-spacing:.3em; text-transform:uppercase;
      padding:4px 12px; border-radius:3px;
      flex-shrink:0;
    }
    .ann-badge.warning  { background:rgba(255,180,0,.15); color:#ffd02a; border:1px solid rgba(255,180,0,.3); }
    .ann-badge.info     { background:rgba(0,180,255,.15); color:#00cfff; border:1px solid rgba(0,180,255,.3); }
    .ann-badge.success  { background:rgba(42,255,139,.15); color:#2aff8b; border:1px solid rgba(42,255,139,.3); }
    .ann-badge.error    { background:rgba(255,60,60,.15);  color:#ff3a2a; border:1px solid rgba(255,60,60,.3); }
    .ann-badge.system_failure { background:rgba(255,0,0,.2); color:#ff2020; border:1px solid rgba(255,0,0,.5); animation:badge-blink .8s step-end infinite; }
    @keyframes badge-blink { 50%{opacity:.4;} }
    .ann-badge.offline { background:rgba(255,100,0,.15); color:#ff6600; border:1px solid rgba(255,100,0,.4); animation:badge-blink .8s step-end infinite; }
    .ann-badge.new      { background:rgba(100,255,100,.15); color:#4dff91; border:1px solid rgba(100,255,100,.35); }
    .ann-badge.updated  { background:rgba(80,180,255,.15); color:#50b4ff; border:1px solid rgba(80,180,255,.35); }
    .ann-badge.default  { background:rgba(255,45,155,.1);  color:var(--pink); border:1px solid rgba(255,45,155,.3); }

    .ann-title { font-family:'Orbitron'; font-size:.9rem; font-weight:700; letter-spacing:.1em; color:var(--white); }
    .ann-date  { margin-left:auto; font-size:.75rem; letter-spacing:.1em; color:var(--dim); flex-shrink:0; }

    .ann-text  { font-size:1.05rem; color:var(--dim); line-height:1.75; letter-spacing:.03em; }

    /* Empty state */
    .ann-empty { text-align:center; padding:80px 20px; color:var(--dim); }
    .ann-empty-icon { font-size:3rem; margin-bottom:16px; opacity:.4; display:block; }
    .ann-empty-text { font-size:1rem; letter-spacing:.1em; }

    /* ── STATUS BAR ── */
    .status-bar { position:fixed; bottom:0; left:0; right:0; z-index:999; display:flex; align-items:center; justify-content:center; gap:40px; padding:12px 48px; background:rgba(5,0,15,.82); backdrop-filter:blur(12px); border-top:1px solid var(--border); flex-wrap:wrap; }
    .status-item { display:flex; align-items:center; gap:10px; font-size:.78rem; letter-spacing:.15em; text-transform:uppercase; color:var(--dim); }
    .status-dot { width:7px; height:7px; border-radius:50%; background:#2aff8b; box-shadow:0 0 8px #2aff8b; animation:dot-pulse 2s ease-in-out infinite; }
    .status-dot.yellow { background:#ffd02a; box-shadow:0 0 8px #ffd02a; }
    @keyframes dot-pulse { 0%,100%{opacity:1;}50%{opacity:.4;} }
    .status-label { color:var(--white); font-weight:600; }

    /* ── PARTICLES ── */
    /* ── PARTICLES ── */
    #particles { position:fixed; inset:0; z-index:0; pointer-events:none; }10%{opacity:.5;}90%{opacity:.3;}100%{transform:translateY(-10vh) translateX(30px);opacity:0;} }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:linear-gradient(var(--purple),var(--pink)); border-radius:2px; }

    @media(max-width:600px){
      .status-bar { gap:10px; padding: 6px 10px; }
      .status-item { font-size:.62rem; gap:6px; }
      .status-dot { width:5px; height:5px; }
      .status-label { font-size:.62rem; }
      nav { padding:14px 20px; }
      .nav-links { gap:14px; }
      .nav-time { display:none; }
      main { padding:110px 16px 90px; }
      .ann-card { padding:20px 18px; }
      .ann-header { flex-wrap:wrap; }
      .ann-date { margin-left:0; }
    }

    /* ── HAMBURGER MENU ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      z-index: 1100;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: all .3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1050;
      background: rgba(5,0,15,.97);
      backdrop-filter: blur(20px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: menu-in .25s ease both;
    }
    .mobile-menu.open { display: flex; }
    @keyframes menu-in {
      from { opacity:0; transform:scale(.97); }
      to   { opacity:1; transform:scale(1); }
    }
    .mobile-menu a {
      font-family: 'Orbitron'; font-size:1.2rem; font-weight:700;
      letter-spacing:.2em; text-transform:uppercase;
      color: var(--dim); text-decoration:none;
      padding: 12px 28px; border-radius:6px;
      border: 1px solid transparent;
      transition: all .2s ease;
      display: inline-block;
    }
    .mobile-menu a:hover {
      color: var(--white);
      border-color: var(--border);
      background: var(--card);
    }
    .mobile-menu a.active {
      background: linear-gradient(135deg, rgba(255,45,155,.1), rgba(139,42,255,.1));
      border-color: rgba(255,45,155,.5);
      color: var(--pink);
      box-shadow: 0 0 16px rgba(255,45,155,.15);
    }
    .mobile-menu-logo {
      font-family:'Orbitron'; font-size:.85rem; font-weight:900;
      letter-spacing:.3em;
      background:linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:32px;
    }
    .mobile-menu-close {
      position: absolute; top:24px; right:24px;
      background:none; border:none; color:var(--dim);
      font-size:1.5rem; cursor:pointer; transition:color .2s;
    }
    .mobile-menu-close:hover { color:var(--white); }

    @media(max-width:768px) {
      .nav-links { display:none; }
      .hamburger { display:flex; }
    }
  </style>
</head>
<body>

<div id="cursor-glow"></div>

<!-- ── MOBILE MENU OVERLAY ── -->
<div class="mobile-menu" id="mobile-menu">
  <button class="mobile-menu-close" onclick="toggleMenu()">✕</button>
  <div class="mobile-menu-logo">NOVA SYNDICATE</div>
  <a href="index.html" >Home</a>
  <a href="team.html" >Team</a>
  <a href="status.html" >Status</a>
  <a href="information.html" >Information</a>
  <a href="announcements.html" class="active">Announcements</a>
</div>
<canvas id="particles"></canvas>

<nav>
  <a href="index.html" class="nav-logo">NOVA SYNDICATE</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="team.html">Team</a></li>
    <li><a href="status.html">Status</a></li>
    <li><a href="information.html">Information</a></li>
    <li><a href="announcements.html" class="active">Announcements</a></li>
  </ul>
  
<!-- ── MOBILE MENU ── -->
<button class="hamburger" id="hamburger" onclick="toggleMenu()">
  <span></span><span></span><span></span>
</button>
  <div class="nav-time" id="live-time">00:00:00</div>
</nav>

<div id="announcement">
  <div class="announcement-inner">
    <span>📢</span>
    <span id="announcement-text"></span>
  </div>
  <button class="announcement-close" onclick="document.getElementById('announcement').style.display='none'">✕</button>
</div>

<main>
  <div class="page-header">
    <span class="page-tag">✦ Nova Syndicate</span>
    <h1 class="page-title">Announcements</h1>
    <p class="page-desc">Stay up to date with the latest news from Nova Syndicate</p>
  </div>

  <div class="ann-list" id="ann-list"></div>
</main>

<div class="status-bar">
  <div class="status-item">
    <span class="status-dot"></span>
    <span>Discord</span>
    <a href="https://discord.gg/SkHmpbVYzw" target="_blank" style="color:var(--white);text-decoration:none;" class="status-label">Online</a>
  </div>
  <div class="status-item">
    <span class="status-dot yellow"></span>
    <span>Team</span>
    <span class="status-label">10 Members</span>
  </div>
  <div class="status-item">
    <span class="status-dot"></span>
    <span>Social</span>
    <a href="https://www.tiktok.com/@nova_syndi0" target="_blank" style="color:var(--white);text-decoration:none;" class="status-label">TikTok Active</a>
  </div>
</div>

<script>
  /* ════════════════════════════════════════════════
     ✏️  ANNOUNCEMENTS — Hier eintragen!
     type: "warning" | "info" | "success" | "error" | "offline" | "system_failure" | "new" | "updated" | "default"
     date: "DD.MM.YYYY"
  ════════════════════════════════════════════════ */
  const ANNOUNCEMENTS = [
    {
      type: "warning",
      title: "Maintenance",
      text: "Website is going in Maintenance at 8 PM untill Tmr 11:50 AM.",
      date: "05.03.2026"
    },
  ];
  /* ════════════════════════════════════════════════ */

  const list = document.getElementById('ann-list');
  const reversed = [...ANNOUNCEMENTS].reverse();

  if (reversed.length === 0) {
    list.innerHTML = `<div class="ann-empty"><span class="ann-empty-icon">📭</span><div class="ann-empty-text">No announcements yet.</div></div>`;
  } else {
    reversed.forEach(a => {
      const card = document.createElement('div');
      card.className = `ann-card ${a.type || 'default'}`;
      card.innerHTML = `
        <div class="ann-header">
          <span class="ann-badge ${a.type || 'default'}">${a.type || 'info'}</span>
          <span class="ann-title">${a.title}</span>
          <span class="ann-date">${a.date}</span>
        </div>
        <div class="ann-text">${a.text}</div>
      `;
      list.appendChild(card);
    });
  }

  /* ── Live time ── */
  function updateTime() {
    const now = new Date();
    document.getElementById('live-time').textContent =
      [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  }
  updateTime(); setInterval(updateTime, 1000);

  // Hamburger menu
  function toggleMenu() {
    const menu = document.getElementById('mobile-menu');
    const btn = document.getElementById('hamburger');
    menu.classList.toggle('open');
    btn.classList.toggle('open');
    document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
  }

  /* ── Cursor Glow ── */
  const glow = document.getElementById('cursor-glow');
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
  });

  /* ── Particle + Grid System ── */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const mouse = {x:-1000, y:-1000};
  const isMobile = window.matchMedia('(max-width:767px)').matches;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();
  window.addEventListener('resize',()=>{resize();initParticles()});
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

  const GRID_SIZE = isMobile ? 48 : 64;
  let gridOffset = 0;

  function drawGrid(){
    const cols = Math.ceil(W / GRID_SIZE) + 2;
    const rows = Math.ceil(H / GRID_SIZE) + 2;
    const ox = gridOffset % GRID_SIZE;
    ctx.save();
    for(let c = -1; c < cols; c++){
      const x = c * GRID_SIZE - ox;
      const bright = (Math.round((x + ox) / GRID_SIZE) % 4 === 0);
      ctx.beginPath();ctx.moveTo(x, 0);ctx.lineTo(x, H);
      ctx.strokeStyle = bright ? 'rgba(255,45,155,.08)' : 'rgba(139,42,255,.04)';
      ctx.lineWidth = bright ? 1 : 0.5;ctx.stroke();
    }
    for(let r = -1; r < rows; r++){
      const y = r * GRID_SIZE - ox;
      const bright = (Math.round((y + ox) / GRID_SIZE) % 4 === 0);
      ctx.beginPath();ctx.moveTo(0, y);ctx.lineTo(W, y);
      ctx.strokeStyle = bright ? 'rgba(255,45,155,.08)' : 'rgba(139,42,255,.04)';
      ctx.lineWidth = bright ? 1 : 0.5;ctx.stroke();
    }
    for(let c = -1; c < cols; c++){
      for(let r = -1; r < rows; r++){
        const x = c * GRID_SIZE - ox;
        const y = r * GRID_SIZE - ox;
        const baseAlpha = (Math.round((x+ox)/GRID_SIZE) % 4 === 0 && Math.round((y+ox)/GRID_SIZE) % 4 === 0) ? 0.2 : 0.08;
        ctx.beginPath();ctx.arc(x, y, 1, 0, Math.PI*2);
        ctx.fillStyle = `rgba(139,42,255,${baseAlpha})`;ctx.fill();
      }
    }
    ctx.restore();
  }

  const COLORS=[[255,45,155],[139,42,255],[192,100,255],[240,180,255],[255,255,255]];

  class Particle{
    constructor(init){this.reset(init)}
    reset(randomY){
      this.x=Math.random()*W;
      this.y=randomY?Math.random()*H:H+10;
      this.vx=(Math.random()-.5)*.3;
      this.vy=-(Math.random()*.6+.35);
      this.size=Math.random()*1.5+.3;
      this.life=0;this.maxLife=Math.random()*300+400;
      this.wave=Math.random()*Math.PI*2;
      this.twinkle=Math.random()*Math.PI*2;
      const c=COLORS[Math.floor(Math.random()*COLORS.length)];
      this.r=c[0];this.g=c[1];this.b=c[2];
    }
    update(){
      this.life++;this.wave+=.018;this.twinkle+=.038;
      this.x+=this.vx+Math.sin(this.wave)*.16;
      this.y+=this.vy;
      if(this.life>this.maxLife||this.y<-20)this.reset(false);
    }
    draw(){
      const p=this.life/this.maxLife;
      const fade=p<.08?p/.08:p>.9?(1-p)/.1:1;
      const alpha=fade*(0.65+0.35*Math.sin(this.twinkle));
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*4);
      g.addColorStop(0,`rgba(${this.r},${this.g},${this.b},${alpha*.55})`);
      g.addColorStop(1,`rgba(${this.r},${this.g},${this.b},0)`);
      ctx.beginPath();ctx.arc(this.x,this.y,this.size*4,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${alpha})`;ctx.fill();
    }
  }

  function drawLines(){
    if(isMobile)return;
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(255,45,155,${(1-d/120)*.18})`;ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
  }

  function initParticles(){
    const count=isMobile?50:Math.min(Math.floor((W*H)/9000),120);
    particles=Array.from({length:count},()=>new Particle(true));
  }

  function animate(){
    ctx.clearRect(0,0,W,H);
    gridOffset += 0.3;
    drawGrid();
    drawLines();
    particles.forEach(p=>{p.update();p.draw()});
    requestAnimationFrame(animate);
  }
  initParticles();animate();
</script>
</body>
</html>
