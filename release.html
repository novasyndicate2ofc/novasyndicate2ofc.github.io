<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Syndicate — Website Release</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{--pink:#ff2d9b;--purple:#8b2aff;--white:#f0e8ff;--dim:rgba(240,232,255,0.5);--bg:#05000f;--card:rgba(139,42,255,0.07);--border:rgba(139,42,255,0.25);}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{background:var(--bg);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:default;}
    #cursor-glow{will-change:transform;position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(255,45,155,0.13) 0%,rgba(139,42,255,0.08) 40%,transparent 70%);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}
    canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
    body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(139,42,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(139,42,255,.04) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0;}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,45,155,.1) 0%,transparent 70%);pointer-events:none;z-index:0;}

    /* ── MAIN WRAP ── */
    .wrap{position:relative;z-index:1;text-align:center;padding:24px;width:100%;max-width:700px;}

    /* ── BADGE ── */
    .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,45,155,.08);border:1px solid rgba(255,45,155,.22);border-radius:20px;padding:6px 18px;margin-bottom:28px;font-size:.68rem;letter-spacing:.35em;color:var(--pink);text-transform:uppercase;font-family:'Share Tech Mono';}
    .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);box-shadow:0 0 8px var(--pink);animation:blink 1.4s ease infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

    /* ── TITLE ── */
    .title{font-family:'Orbitron';font-size:clamp(1.6rem,6vw,3.4rem);font-weight:900;letter-spacing:.1em;line-height:1.1;margin-bottom:12px;}
    .title-line1{background:linear-gradient(135deg,var(--white) 0%,rgba(240,232,255,.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .title-line2{background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(255,45,155,.3));}

    .subtitle{font-size:1rem;color:var(--dim);letter-spacing:.08em;font-weight:300;margin-bottom:48px;}

    /* ── COUNTDOWN ── */
    .countdown{display:flex;gap:16px;justify-content:center;margin-bottom:48px;flex-wrap:wrap;}
    .cd-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;min-width:90px;position:relative;overflow:hidden;}
    .cd-block::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,155,.05),transparent);pointer-events:none;}
    .cd-num{font-family:'Orbitron';font-size:2.6rem;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--white),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
    .cd-label{font-size:.6rem;letter-spacing:.3em;color:rgba(240,232,255,.3);text-transform:uppercase;font-family:'Share Tech Mono';}
    .cd-sep{display:flex;align-items:center;font-family:'Orbitron';font-size:2rem;font-weight:900;color:rgba(255,45,155,.4);padding-bottom:24px;}

    /* ── DATE INFO ── */
    .date-info{font-family:'Share Tech Mono';font-size:.75rem;letter-spacing:.15em;color:rgba(240,232,255,.25);margin-bottom:48px;}
    .date-info span{color:rgba(255,45,155,.6);}

    /* ── RELEASED STATE ── */
    #released-state{display:none;}
    .released-icon{font-size:4rem;margin-bottom:16px;animation:pop .6s ease both;}
    @keyframes pop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
    .released-title{font-family:'Orbitron';font-size:clamp(1.8rem,6vw,3rem);font-weight:900;letter-spacing:.1em;background:linear-gradient(135deg,#50ff8c,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(80,255,140,.3));margin-bottom:12px;}
    .released-sub{font-size:1rem;color:var(--dim);letter-spacing:.06em;font-weight:300;margin-bottom:32px;}
    .btn-enter{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#50ff8c,#00d4ff);color:#05000f;font-family:'Orbitron';font-size:.8rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;padding:16px 36px;border-radius:6px;box-shadow:0 0 32px rgba(80,255,140,.25);transition:all .3s;}
    .btn-enter:hover{box-shadow:0 0 52px rgba(80,255,140,.45);transform:translateY(-2px);}

    /* ── CONFETTI ── */
    .confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999;animation:confetti-fall linear forwards;}
    @keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

    @media(max-width:500px){
      .countdown{gap:8px;}
      .cd-block{min-width:68px;padding:14px 14px;}
      .cd-num{font-size:1.8rem;}
      .cd-sep{font-size:1.4rem;padding-bottom:16px;}
    }
  </style>
</head>
<body>
<div id="cursor-glow"></div>
<canvas id="particles"></canvas>

<div class="wrap">

  <!-- COUNTDOWN STATE -->
  <div id="countdown-state">
    <div class="badge"><div class="badge-dot"></div>Coming Soon</div>
    <div class="title">
      <div class="title-line1">NOVA SYNDICATE</div>
      <div class="title-line2">WEBSITE RELEASE</div>
    </div>
    <div class="subtitle">The official website launches on Wednesday — stay tuned.</div>

    <div class="countdown">
      <div class="cd-block"><div class="cd-num" id="cd-days">00</div><div class="cd-label">Days</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-block"><div class="cd-num" id="cd-hrs">00</div><div class="cd-label">Hours</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-block"><div class="cd-num" id="cd-mins">00</div><div class="cd-label">Minutes</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-block"><div class="cd-num" id="cd-secs">00</div><div class="cd-label">Seconds</div></div>
    </div>

    <div class="date-info">Wednesday <span>11 March 2026</span> · <span>17:00 UK Time</span> (GMT+0)</div>
  </div>

  <!-- RELEASED STATE -->
  <div id="released-state">
    <div class="released-icon">🚀</div>
    <div class="released-title">WE ARE LIVE</div>
    <div class="released-sub">Nova Syndicate is officially released. Welcome to the community.</div>
    <a href="index.html" class="btn-enter">Enter Website →</a>
  </div>

</div>

<script>
  /* ── CURSOR ── */
  const glow = document.getElementById('cursor-glow');
  document.addEventListener('mousemove', e => { glow.style.left=e.clientX+'px'; glow.style.top=e.clientY+'px'; });

  /* ── RELEASE DATE — 11 March 2026 17:00 UK (GMT+0) ── */
  const RELEASE = new Date('2026-03-11T17:00:00Z');

  let released = false;

  function launchConfetti() {
    const colors = ['#ff2d9b','#8b2aff','#50ff8c','#00d4ff','#ffd700','#ffffff'];
    for (let i = 0; i < 120; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (Math.random() * 2.5 + 1.5) + 's';
      el.style.animationDelay = (Math.random() * 1.5) + 's';
      el.style.width = el.style.height = (Math.random() * 8 + 5) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }
  }

  function showReleased() {
    if (released) return;
    released = true;
    document.getElementById('countdown-state').style.display = 'none';
    document.getElementById('released-state').style.display = 'block';
    launchConfetti();
    setTimeout(launchConfetti, 1500);
    setTimeout(launchConfetti, 3000);
  }

  function tick() {
    const now = new Date();
    const diff = RELEASE - now;

    if (diff <= 0) {
      showReleased();
      return;
    }

    const days = Math.floor(diff / 86400000);
    const hrs  = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);

    document.getElementById('cd-days').textContent = String(days).padStart(2,'0');
    document.getElementById('cd-hrs').textContent  = String(hrs).padStart(2,'0');
    document.getElementById('cd-mins').textContent = String(mins).padStart(2,'0');
    document.getElementById('cd-secs').textContent = String(secs).padStart(2,'0');
  }

  tick();
  setInterval(tick, 1000);

  /* ── PARTICLES ── */
  const canvas=document.getElementById('particles');const ctx=canvas.getContext('2d');let W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}resize();
  window.addEventListener('resize',resize);
  const COLORS=[[255,45,155],[139,42,255],[192,100,255],[255,255,255]];
  class P{constructor(r){this.reset(r)}reset(r){this.x=Math.random()*W;this.y=r?Math.random()*H:H+10;this.vx=(Math.random()-.5)*.3;this.vy=-(Math.random()*.5+.2);this.size=Math.random()*1.2+.3;this.life=0;this.maxLife=Math.random()*300+300;this.wave=Math.random()*Math.PI*2;this.twinkle=Math.random()*Math.PI*2;const c=COLORS[Math.floor(Math.random()*COLORS.length)];this.r=c[0];this.g=c[1];this.b=c[2];}update(){this.life++;this.wave+=.018;this.twinkle+=.038;this.x+=this.vx+Math.sin(this.wave)*.12;this.y+=this.vy;if(this.life>this.maxLife||this.y<-20)this.reset(false);}draw(){const p=this.life/this.maxLife;const fade=p<.08?p/.08:p>.9?(1-p)/.1:1;const alpha=fade*(0.6+0.4*Math.sin(this.twinkle));const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*4);g.addColorStop(0,`rgba(${this.r},${this.g},${this.b},${alpha*.5})`);g.addColorStop(1,`rgba(${this.r},${this.g},${this.b},0)`);ctx.beginPath();ctx.arc(this.x,this.y,this.size*4,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${alpha})`;ctx.fill();}}
  function initP(){particles=Array.from({length:100},()=>new P(true));}
  function animate(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}
  initP();animate();
</script>
</body>
</html>
